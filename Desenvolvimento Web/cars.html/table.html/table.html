<!DOCTYPE html>
<html lang="pt-br">
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablety</title>
<head>
    <style>
        table {
            border-collapse: collapse; 
            width: 300px;
            font-family: serif;
            border: 2px solid black;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }

       
        .titulo {
            background-color: rgb(243, 213, 124);
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

      
        .coluna-header {
            background-color: #97CBFA;
            font-weight: bold;
            font-size: 1.1rem;
        }

        
        .fonte {
            background-color: #E6e6e6;
            font-size: 0.7rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td colspan="2" class="titulo">Vendas do 1º Semestre</td>
        </tr>
        
        <tr>
            <td class="coluna-header">Modelo</td>
            <td class="coluna-header">Unidades</td>
        </tr>

        <tr>
            <td>Palio</td>
            <td>585.240</td>
        </tr>

        <tr>
            <td>Gol</td>
            <td>529.894</td>
        </tr>

        <tr>
            <td colspan="2" class="fonte">fonte: agencia Reuters</td>
        </tr>
    </table>

</body>
</html>
