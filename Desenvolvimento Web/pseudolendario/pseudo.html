<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Classes</title>
    <style>

        li:first-child{
           font-weight: bold;
    }
    li:last-child{
        color: red;
    }
    a:link {
        color: navy;
    }
    a:visited{
        color:goldenrod;
    }
    a:hover{
        filter: invert(1);
    }
    
    </style>
</head>
<body>
    

    <ul>
        <li>item 1</li>
        <li>item 2</li>
        <li>item 3</li>

    </ul> 

    <a href="https://developer.mozilla.org/pt-BR/docs/Web/CSS/Guides/Cascade/Specificity">

    </a>
</body>
</html>
